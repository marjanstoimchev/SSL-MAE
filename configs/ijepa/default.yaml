# I-JEPA default config (parameters from the original paper)

experiment:
  name: "ssl_ijepa"
  seed: 42

data:
  hf_dataset_name: null
  data_dir: null
  learning_task: "mlc"
  n_classes: 17
  image_size: 224
  batch_size: 16
  num_workers: 4
  fraction_labeled: 0.1
  # I-JEPA uses block masking, these control the binary mask for interface compat
  mask_ratio: 0.75
  mask_patch_size: 16
  model_patch_size: 16
  image_key: "image"
  label_key: "label"

model:
  type: "ijepa"
  architecture: "vit"
  model_size: "base"
  w: null
  # I-JEPA specific
  predictor_embed_dim: 384
  predictor_depth: 6
  ema_target_decay: 0.996

# I-JEPA mask config (from original paper)
mask:
  enc_mask_scale: [0.85, 1.0]
  pred_mask_scale: [0.15, 0.2]
  aspect_ratio: [0.75, 1.5]
  num_pred_masks: 4
  min_keep: 10
  allow_overlap: false

training:
  mode: "semi_supervised"
  epochs: 100
  # Fine-tuning LR (lower than from-scratch: 1e-3)
  lr: 1.0e-4
  start_lr: 1.0e-5
  lr_w: 1.0e-3
  min_lr: 1.0e-6
  # Fine-tuning WD (lower than from-scratch: 0.04)
  weight_decay: 1.0e-4
  final_weight_decay: 1.0e-4
  warmup_epochs: 5
  n_accumulate: 1
  patience: 10
  apply_scheduler: true
  precision: "bf16-mixed"
  devices: [0]
  strategy: "auto"
  sync_batchnorm: true
  checkpoint:
    dir: "outputs"
    monitor: "val_loss"
    mode: "min"

logging:
  logger: "csv"
  project: "SSL-IJEPA"
  log_every_n_steps: 1
