# MAE default config

experiment:
  name: "ssl_mae"
  seed: 42

data:
  hf_dataset_name: null
  data_dir: null
  learning_task: "mlc"
  n_classes: 17
  image_size: 224
  batch_size: 16
  num_workers: 4
  fraction_labeled: 0.1
  mask_ratio: 0.75
  mask_patch_size: 16
  model_patch_size: 16
  image_key: "image"
  label_key: "label"

model:
  type: "mae"
  architecture: "deit"
  model_size: "base"
  w: null

training:
  mode: "semi_supervised"
  epochs: 100
  lr: 1.0e-4
  lr_w: 1.0e-3
  min_lr: 1.0e-5
  weight_decay: 1.0e-6
  warmup_epochs: 5
  ema_decay: 0
  n_accumulate: 1
  patience: 10
  apply_scheduler: true
  precision: "bf16-mixed"
  devices: [0]
  strategy: "auto"
  sync_batchnorm: true
  checkpoint:
    dir: "outputs"
    monitor: "val_loss"
    mode: "min"

logging:
  logger: "csv"
  project: "SSL-MAE"
  log_every_n_steps: 1
